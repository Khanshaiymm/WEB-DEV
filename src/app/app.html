<div class="page">
  <h1 class="title">Online Store</h1>

  <div class="tabs">
    <button class="tab" (click)="selectAll()" [class.active]="selectedCategoryId === null">
      All
    </button>

    @for (c of categories; track c.id) {
      <button class="tab" (click)="selectCategory(c.id)" [class.active]="c.id === selectedCategoryId">
        {{ c.name }}
      </button>
    }
  </div>

  @if (selectedProducts.length === 0) {
    <p class="hint">No products to show.</p>
  } @else {
    <app-product-list [products]="selectedProducts"></app-product-list>
  }
</div>
