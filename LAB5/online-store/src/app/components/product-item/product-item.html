<div class="card">
  <img class="img" [src]="product().imageUrl" alt="{{ product().name }}"/>

  <h3 class="name">{{ product().name }}</h3>
  <p class="desc">{{ product().description }}</p>

  <div class="price">{{ product().price }} ₸</div>

  <div class="row">
    <div class="rating">⭐ {{ product().rating }}</div>
    <div class="stock">In stock</div>
  </div>

  <a class="kaspi" [href]="product().link" target="_blank" rel="noopener">
    Open on Kaspi
  </a>

  <div class="miniRow">
    <button class="mini" (click)="like()">❤️ {{ product().likes }}</button>
    <button class="mini danger" (click)="remove()">🗑</button>
    <button class="mini" (click)="shareWhatsApp()">WA</button>
    <button class="mini" (click)="shareTelegram()">TG</button>
  </div>
</div>
